name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: standardrb (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "4.0"
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec standardrb

  standalone:
    name: standalone (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec

  rails:
    name: rails-${{ matrix.rails }} (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: "3.2"
            rails: "7.2"
            gemfile: gemfiles/rails_7_2.gemfile
          - ruby: "3.2"
            rails: "8.0"
            gemfile: gemfiles/rails_8_0.gemfile
          - ruby: "3.2"
            rails: "8.1"
            gemfile: gemfiles/rails_8_1.gemfile
          - ruby: "3.3"
            rails: "7.2"
            gemfile: gemfiles/rails_7_2.gemfile
          - ruby: "3.3"
            rails: "8.0"
            gemfile: gemfiles/rails_8_0.gemfile
          - ruby: "3.3"
            rails: "8.1"
            gemfile: gemfiles/rails_8_1.gemfile
          - ruby: "3.4"
            rails: "7.2"
            gemfile: gemfiles/rails_7_2.gemfile
          - ruby: "3.4"
            rails: "8.0"
            gemfile: gemfiles/rails_8_0.gemfile
          - ruby: "3.4"
            rails: "8.1"
            gemfile: gemfiles/rails_8_1.gemfile
          - ruby: "4.0"
            rails: "7.2"
            gemfile: gemfiles/rails_7_2.gemfile
          - ruby: "4.0"
            rails: "8.0"
            gemfile: gemfiles/rails_8_0.gemfile
          - ruby: "4.0"
            rails: "8.1"
            gemfile: gemfiles/rails_8_1.gemfile
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ matrix.gemfile }}
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec
