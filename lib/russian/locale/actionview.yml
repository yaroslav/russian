        few: "%{count} секунды"
        many: "%{count} секунд"
        other: "%{count} секунд"
      less_than_x_minutes:
        one: "меньше %{count} минуты"
        few: "меньше %{count} минут"
        many: "меньше %{count} минут"
        other: "меньше %{count} минут"
      x_minutes:
        one: "%{count} минута"
        few: "%{count} минуты"
        many: "%{count} минут"
        other: "%{count} минут"
      about_x_hours:
