ru:
  number:
    # Used in number_with_delimiter()
    # These are also the defaults for 'currency', 'percentage',
    # 'precision', and 'human'.
    #
    #
    # Используется в number_with_delimiter()
    # Также является установками по умолчанию для 'currency', 'percentage',
    # 'precision', 'human'.
    format:
      # Sets the separator between the units, for more precision
      # (e.g. 1.0 / 2.0 == 0.5)
      separator: ","
      # Delimets thousands (e.g. 1,000,000 is a million)
      # (always in groups of three)
      delimiter: " "
      # Number of decimals, behind the separator
      # (the number 1 with a precision of 2 gives: 1.00)
      precision: 3
      round_mode: default
      significant: false
      strip_insignificant_zeros: false

    # Used in number_to_currency()
    #
    #
    # Используется в number_to_currency()
    currency:
      format:
        # Формат отображения валюты и обозначение самой валюты
        format: "%n %u"
        negative_format: "-%n %u"

        # перечеркнутый символ Р доступен не везде и
        # часто делается обходными путями
        unit: "руб."

        # These three are to override number.format and are optional
        separator: ","
        delimiter: " "
        precision: 2
        significant: false
        strip_insignificant_zeros: false

    # Used in number_to_percentage()
    percentage:
      format:
        # These three are to override number.format and are optional
        # separator:
        delimiter: ""
        format: "%n%"

    # Used in number_to_precision()
    precision:
      format:
        # These three are to override number.format and are optional
        # separator:
        delimiter: ""
        # precision:

    # Used in number_to_human_size()
    human:
      format:
        # These three are to override number.format and are optional
        # separator:
        delimiter: ""
        precision: 1
        significant: false
        strip_insignificant_zeros: false

      storage_units:
        # Storage units output formatting.
        # %u is the storage unit, %n is the number (default: 2 MB)
        format: "%n %u"
        units:
          byte:
            one: "байт"
            few: "байта"
            many: "байт"
            other: "байта"
          eb: "ЭБ"
          kb: "КБ"
          mb: "МБ"
          pb: "ПБ"
          gb: "ГБ"
          tb: "ТБ"

      decimal_units:
        format: "%n %u"
        units:
          unit: ""
          thousand:
            one: "тысяча"
            few: "тысяч"
            many: "тысяч"
            other: "тысяч"
          million:
            one: "миллион"
            few: "миллионов"
            many: "миллионов"
            other: "миллионов"
          billion:
            one: "миллиард"
            few: "миллиардов"
            many: "миллиардов"
            other: "миллиардов"
          trillion:
            one: "триллион"
            few: "триллионов"
            many: "триллионов"
            other: "триллионов"
          quadrillion:
            one: "квадриллион"
            few: "квадриллионов"
            many: "квадриллионов"
            other: "квадриллионов"

  # Used in distance_of_time_in_words(),
  # distance_of_time_in_words_to_now(), time_ago_in_words().
  #
  #
  # Используется в хелперах distance_of_time_in_words(),
  # distance_of_time_in_words_to_now(), time_ago_in_words().
